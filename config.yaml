mock_mode: true

robot:
  type: so101_follower
  port: /dev/REPLACE_WITH_SO101_PORT
  id: replace_with_robot_id
  home_pose: [0, 0, 0, 0, 0, 0]

policy:
  checkpoint: lerobot/MolmoAct2-SO100_101-LeRobot
  # After training on Modal, run `python src/house_builder/sync_checkpoint.py` to pull
  # the checkpoint down from your Modal Volume, then point this at the printed local
  # path to use your fine-tune instead of the stock checkpoint above.
  local_checkpoint: null
  device: cuda
  skill_duration_seconds: 10
  # image_keys: [observation.images.cam0, observation.images.cam1]  # policy.py assumption -- override if your checkpoint uses different names
  # action_names: [shoulder_pan.pos, shoulder_lift.pos, elbow_flex.pos, wrist_flex.pos, wrist_roll.pos, gripper.pos]  # policy.py assumption -- override if different

cameras:
  cam0:
    index: 0
    width: 640
    height: 480
    fps: 30
  cam1:
    index: 1
    width: 640
    height: 480
    fps: 30
  # Reference camera: points at a human-built model house so the web dashboard can
  # scan its door/wall/roof colors and turn them into a HouseRequest. Not used by
  # run.py or the harness build loop -- only by backend/camera_hub.py.
  cam2:
    index: 2
    width: 640
    height: 480
    fps: 30

verification:
  # EXAMPLE CAM1 PIXEL VALUES: calibrate for the installed side camera.
  target_x: 320
  max_center_error_px: 25
  max_stack_alignment_error_px: 25
  stability_frames: 10
  max_stability_movement_px: 5
  min_color_occupancy: 0.01

  # EXAMPLE SIDE-CAMERA BANDS: calibrate before running real hardware.
  height_regions:
    door: {min_y: 300, max_y: 380}
    wall: {min_y: 220, max_y: 300}
    roof: {min_y: 140, max_y: 220}
